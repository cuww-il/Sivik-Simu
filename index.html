<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sivik Galaxy Plus — Симулятор балансировочного станка</title>
<style>
  :root{
    --bg:#0d1b2a;
    --panel:#111827;
    --accent:#0ea5a4;
    --neon-red:#ff3b30;
    --neon-green:#39ff14;
    --glass: rgba(255,255,255,0.04);
    --muted:#9aa7b2;
  }
  html,body{height:100%;margin:0;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;background:linear-gradient(180deg,var(--bg), #07101a);color:#dbe7ef;overflow:hidden;}
  
  .app{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
    box-sizing:border-box;
  }

  /* Стартовая панель для обхода блокировки звука */
  #overlay {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(7, 16, 26, 0.95);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .start-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .start-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .start-btn:hover { transform: scale(1.05); }

  /* Main frame */
  .machine{
    width:100%;
    max-width:1100px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:14px;
    padding:22px;
    box-shadow: 0 10px 40px rgba(2,6,23,0.7), inset 0 1px 0 rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.03);
    display:grid;
    grid-template-columns: 260px 1fr 260px;
    gap:18px;
    align-items:start;
  }

  .side{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:10px;
    padding:14px;
    box-shadow: 0 6px 18px rgba(2,6,23,0.6);
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
  }

  .display{
    width:100%;
    background:linear-gradient(180deg,#071826, #07121a);
    border-radius:8px;
    padding:12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6), inset 0 -6px 18px rgba(255,255,255,0.02);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  .display .label{font-size:13px;color:var(--muted);letter-spacing:1px}
  
  .digits{
    font-family: "Courier New", Courier, monospace;
    font-size:44px;
    line-height:1;
    color:var(--neon-red);
    text-shadow: 0 0 8px rgba(255,59,48,0.25), 0 0 18px rgba(255,59,48,0.12), 0 6px 20px rgba(0,0,0,0.6);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    padding:8px 14px;
    border-radius:6px;
    min-width:120px;
    text-align:center;
    box-sizing:border-box;
    border:1px solid rgba(255,255,255,0.02);
  }
  .digits.ok{
    color:var(--neon-green);
    text-shadow: 0 0 10px rgba(57,255,20,0.4);
  }

  /* Шкала докрутки */
  .scale-bar {
    width: 20px;
    height: 120px;
    background: #050b11;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .scale-fill {
    width: 100%;
    height: 0%;
    background: var(--neon-red);
    position: absolute;
    bottom: 0;
    transition: height 0.2s, background 0.2s;
  }
  .scale-fill.ok { background: var(--neon-green); }

  /* Центральная зона с 3D колесом */
  .center-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 100%;
  }

  .wheel-wrapper {
    perspective: 800px;
    margin: 20px 0;
  }

  .wheel-3d {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, #334155 10%, #1e293b 40%, #0f172a 70%);
    border: 14px solid #475569;
    box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.9);
    transform: rotateX(20deg);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Протекторы шины (псевдо-3D насечки) */
  .wheel-3d::before {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 4px dashed rgba(255,255,255,0.07);
  }

  .spinning {
    animation: spin 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  @keyframes spin {
    0% { transform: rotateX(20deg) rotate(0deg); }
    100% { transform: rotateX(20deg) rotate(360deg); }
  }

  /* Зоны сброса грузиков поверх колеса */
  .drop-targets {
    position: absolute;
    width: 100%; height: 100%;
    top:0; left:0;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .drop-zone {
    width: 100px; height: 100%;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed rgba(255,255,255,0.05);
    border-radius: 8px;
    transition: background 0.2s;
  }
  .drop-zone.hovered {
    background: rgba(14, 165, 164, 0.15);
    border-color: var(--accent);
  }

  /* Нижний контейнер с грузами */
  .bottom-panel {
    grid-column: 1 / span 3;
    background: var(--panel);
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 16px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .weight-card {
    background: linear-gradient(135deg, #475569, #334155);
    border: 1px solid #64748b;
    color: #fff;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    cursor: grab;
    user-select: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }
  .weight-card:active { cursor: grabbing; }

  .placed-weight {
    background: #64748b;
    color: #fff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-top: 4px;
    border: 1px solid #cbd5e1;
  }

  .action-btn {
    background: #16a34a;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    display: none;
  }
</style>
</head>
<body>

<!-- Экран приветствия -->
<div id="overlay">
  <div class="start-card">
    <h1 style="margin-top:0;">Sivik Galaxy Plus</h1>
    <p style="color:var(--muted); margin-bottom:25px;">Нажмите кнопку для загрузки операционной системы станка</p>
    <button class="start-btn" onclick="bootMachine()">Запустить станок</button>
  </div>
</div>

<div class="app">
  <div class="machine">
    
    <!-- Слева -->
    <div class="side">
      <div class="display">
        <span class="label">ВНУТРЕННЯЯ (ЛЕВАЯ)</span>
        <div id="left-val" class="digits">0</div>
      </div>
      <div class="scale-bar"><div id="left-scale" class="scale-fill"></div></div>
    </div>

    <!-- Центр -->
    <div class="center-zone">
      <div style="font-size: 18px; font-weight: bold; color: var(--accent);">DIAGNOSTIC MODE</div>
      <div class="wheel-wrapper">
        <div id="wheel" class="wheel-3d">
          <div style="color: #64748b; font-weight: bold; font-size: 20px; letter-spacing: 2px;">SIVIK</div>
          <div class="drop-targets">
            <div class="drop-zone" id="zone-left" data-side="left"></div>
            <div class="drop-zone" id="zone-right" data-side="right"></div>
          </div>
        </div>
      </div>
      <button id="btn-next" class="action-btn" onclick="startMeasurement()">Следующее измерение</button>
    </div>

    <!-- Справа -->
    <div class="side">
      <div class="display">
        <span class="label">ВНЕШНЯЯ (ПРАВАЯ)</span>
        <div id="right-val" class="digits">0</div>
      </div>
      <div class="scale-bar"><div id="right-scale" class="scale-fill"></div></div>
    </div>

    <!-- Грузики -->
    <div class="bottom-panel">
      <div class="weight-card" draggable="true" data-weight="5">5 г</div>
      <div class="weight-card" draggable="true" data-weight="10">10 г</div>
      <div class="weight-card" draggable="true" data-weight="15">15 г</div>
      <div class="weight-card" draggable="true" data-weight="30">30 г</div>
    </div>

  </div>
</div>

<script>
  const weightOptions =;
  let targetLeft = 0, targetRight = 0;
  let currentLeft = 0, currentRight = 0;
  let draggedWeight = 0;

  // Суровый мужской голос Sivik (низкий pitch)
  function speakSivik(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel(); // Стопаем прошлую фразу
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ru-RU';
      utterance.pitch = 0.55; // Делаем голос грубым и низким
      utterance.rate = 0.85;  // Немного замедляем для брутальности
      window.speechSynthesis.speak(utterance);
    }
  }

  function bootMachine() {
    document.getElementById('overlay').style.display = 'none';
    startMeasurement();
  }

  function startMeasurement() {
    document.getElementById('btn-next').style.display = 'none';
    document.querySelectorAll('.placed-weight').forEach(w => w.remove());
    
    // Сброс значений
    currentLeft = 0; currentRight = 0;
    
    // Визуальное вращение колеса
    const wheel = document.getElementById('wheel');
    wheel.classList.add('spinning');
    
    speakSivik("Идёт измерение");

    setTimeout(() => {
      wheel.classList.remove('spinning');
      
      targetLeft = weightOptions[Math.floor(Math.random() * weightOptions.length)];
      targetRight = weightOptions[Math.floor(Math.random() * weightOptions.length)];
      
      updateInterface();
      generateVoiceReport();
    }, 2000);
  }

  function generateVoiceReport() {
    let report = "";
    if (targetLeft === 0) report += "С левой стороны в норме. ";
else report += С левой стороны ${targetLeft} грамм. ;if (targetRight === 0) report += "С правой стороны в норме.";else report += С правой стороны ${targetRight} грамм.;speakSivik(report);}function updateInterface() {// Левая сторонаconst leftDiff = targetLeft - currentLeft;const leftValEl = document.getElementById('left-val');const leftScale = document.getElementById('left-scale');if (leftDiff <= 0) {leftValEl.textContent = "0";leftValEl.classList.add('ok');leftScale.style.height = "100%";leftScale.classList.add('ok');} else {leftValEl.textContent = leftDiff;leftValEl.classList.remove('ok');leftScale.style.height = ${Math.min(100, (currentLeft / targetLeft) * 100)}%;leftScale.classList.remove('ok');}// Правая сторонаconst rightDiff = targetRight - currentRight;const rightValEl = document.getElementById('right-val');const rightScale = document.getElementById('right-scale');if (rightDiff <= 0) {rightValEl.textContent = "0";rightValEl.classList.add('ok');rightScale.style.height = "100%";rightScale.classList.add('ok');} else {rightValEl.textContent = rightDiff;rightValEl.classList.remove('ok');rightScale.style.height = ${Math.min(100, (currentRight / targetRight) * 100)}%;rightScale.classList.remove('ok');}// Проверка финалаif (leftDiff <= 0 && rightDiff <= 0) {speakSivik("Колесо отбалансировано");document.getElementById('btn-next').style.display = 'block';}}// Drag and Drop логикаdocument.querySelectorAll('.weight-card').forEach(card => {card.addEventListener('dragstart', (e) => {draggedWeight = parseInt(e.target.getAttribute('data-weight'));});});document.querySelectorAll('.drop-zone').forEach(zone => {zone.addEventListener('dragover', (e) => {e.preventDefault();zone.classList.add('hovered');});zone.addEventListener('dragleave', () => zone.classList.remove('hovered'));zone.addEventListener('drop', (e) => {e.preventDefault();zone.classList.remove('hovered');const side = zone.getAttribute('data-side');if (side === 'left') currentLeft += draggedWeight;else currentRight += draggedWeight;// Отрисовка грузика на колесеconst wEl = document.createElement('div');wEl.className = 'placed-weight';wEl.textContent = ${draggedWeight}g;zone.appendChild(wEl);updateInterface();});});
