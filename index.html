<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sivik Galaxy Plus — Симулятор балансировочного станка</title>
  <style>
    /* ----- Общие сбросы и переменные (стиль Sivik) ----- */
    :root {
      --bg-dark: #0a0e17;
      --panel-bg: #0f1621;
      --accent-cyan: #00d4c0;
      --accent-blue: #1a6b8a;
      --neon-red: #ff3b30;
      --neon-green: #3dff7a;
      --muted: #6a7f94;
      --text-light: #c8d6e5;
      --btn-bg: #1a2634;
      --btn-border: #2a3a4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: 'Courier New', 'Consolas', monospace;
      background: radial-gradient(ellipse at 50% 20%, #111f2e, #070b12);
      color: var(--text-light);
      overflow: hidden;
      user-select: none;
    }

    /* ----- Стартовый экран (оригинальный Sivik) ----- */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 11, 18, 0.97);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-card {
      background: linear-gradient(145deg, #0f1a26, #080e16);
      border: 1px solid var(--accent-cyan);
      padding: 44px 54px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 212, 192, 0.06), inset 0 0 40px rgba(0, 212, 192, 0.02);
      max-width: 480px;
    }

    .start-card h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--accent-cyan);
      text-shadow: 0 0 30px rgba(0, 212, 192, 0.15);
      margin-bottom: 2px;
    }

    .start-card .sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 8px;
      text-transform: uppercase;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 10px;
      margin-bottom: 24px;
    }

    .start-btn {
      background: transparent;
      color: var(--accent-cyan);
      border: 1.5px solid var(--accent-cyan);
      padding: 14px 44px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 3px;
      background: rgba(0, 212, 192, 0.04);
    }

    .start-btn:hover {
      background: var(--accent-cyan);
      color: #0a0e17;
      box-shadow: 0 0 40px rgba(0, 212, 192, 0.25);
      transform: scale(1.03);
    }

    /* ----- Основной интерфейс станка (сетка) ----- */
    .app {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .machine {
      width: 100%;
      max-width: 1160px;
      background: linear-gradient(165deg, rgba(16, 26, 38, 0.92), rgba(8, 14, 22, 0.96));
      border-radius: 20px;
      padding: 20px 22px 16px;
      border: 1px solid rgba(0, 212, 192, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      display: grid;
      grid-template-columns: 210px 1fr 210px;
      gap: 14px;
      align-items: start;
    }

    /* ----- Боковые панели (дисплеи) ----- */
    .side {
      background: rgba(12, 20, 30, 0.5);
      border-radius: 12px;
      padding: 12px 10px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .display {
      width: 100%;
      background: #070d14;
      border-radius: 6px;
      padding: 8px 6px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .display .label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .digits {
      font-family: 'Courier New', monospace;
      font-size: 44px;
      line-height: 1.2;
      color: var(--neon-red);
      text-shadow: 0 0 12px rgba(255, 59, 48, 0.2);
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 80px;
      text-align: center;
      letter-spacing: 3px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .digits.ok {
      color: var(--neon-green);
      text-shadow: 0 0 20px rgba(61, 255, 122, 0.2);
    }

    /* Шкала (в стиле Sivik) */
    .scale-bar {
      width: 14px;
      height: 100px;
      background: #03080f;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    .scale-fill {
      width: 100%;
      height: 0%;
      background: var(--neon-red);
      position: absolute;
      bottom: 0;
      transition: height 0.25s ease, background 0.3s;
      border-radius: 0 0 8px 8px;
    }

    .scale-fill.ok {
      background: var(--neon-green);
      box-shadow: 0 0 20px rgba(61, 255, 122, 0.15);
    }

    /* ----- Центр: колесо и управление ----- */
    .center-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .center-zone .title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-cyan);
      letter-spacing: 5px;
      text-transform: uppercase;
      background: rgba(0, 212, 192, 0.04);
      padding: 3px 16px;
      border-radius: 20px;
      border: 1px solid rgba(0, 212, 192, 0.06);
    }

    .wheel-wrapper {
      perspective: 900px;
      margin: 4px 0 2px;
    }

    .wheel-3d {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #3a4a5e, #0f1a26 70%, #050a10);
      border: 10px solid #2a3a4a;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 212, 192, 0.02);
      transform: rotateX(18deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .wheel-3d::before {
      content: '';
      position: absolute;
      width: 94%;
      height: 94%;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.04);
    }

    .wheel-3d .brand {
      color: rgba(255, 255, 255, 0.06);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 6px;
      z-index: 1;
      text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .spinning {
      animation: spin 1.6s cubic-bezier(0.3, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotateX(18deg) rotate(0deg);
      }
      100% {
        transform: rotateX(18deg) rotate(360deg);
      }
    }

    /* Зоны сброса грузов */
    .drop-targets {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      padding: 0 6px;
    }

    .drop-zone {
      width: 60px;
      height: 100%;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      transition: all 0.25s;
      gap: 2px;
      padding: 4px;
    }

    .drop-zone.hovered {
      background: rgba(0, 212, 192, 0.08);
      border-color: var(--accent-cyan);
      box-shadow: inset 0 0 30px rgba(0, 212, 192, 0.02);
    }

    .placed-weight {
      background: rgba(0, 212, 192, 0.12);
      color: var(--accent-cyan);
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(0, 212, 192, 0.15);
      font-weight: 600;
      width: 100%;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* ----- Панель управления (кнопки в стиле Sivik) ----- */
    .control-panel {
      grid-column: 1 / span 3;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    .ctrl-btn {
      background: transparent;
      color: var(--text-light);
      border: 1px solid var(--btn-border);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--btn-bg);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      font-family: inherit;
    }

    .ctrl-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0, 212, 192, 0.05);
      transform: translateY(-1px);
    }

    .ctrl-btn:active {
      transform: scale(0.97);
    }

    .ctrl-btn.primary {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .ctrl-btn.primary:hover {
      background: var(--accent-cyan);
      color: #0a0e17;
    }

    .ctrl-btn.danger {
      border-color: var(--neon-red);
      color: var(--neon-red);
    }

    .ctrl-btn.danger:hover {
      background: var(--neon-red);
      color: #0a0e17;
    }

    .ctrl-btn.success {
      border-color: var(--neon-green);
      color: var(--neon-green);
    }

    .ctrl-btn.success:hover {
      background: var(--neon-green);
      color: #0a0e17;
    }

    /* Индикатор "Бенз" */
    .fuel-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.02);
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .fuel-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 12px rgba(61, 255, 122, 0.2);
      animation: pulse-dot 1.5s infinite;
    }

    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    /* ----- Нижняя панель с грузами (оригинальный стиль) ----- */
    .bottom-panel {
      grid-column: 1 / span 3;
      background: rgba(12, 20, 30, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .weight-card {
      background: linear-gradient(145deg, #1e2f3e, #0f1a26);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-light);
      padding: 8px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: all 0.2s;
      letter-spacing: 1px;
      border-left: 2px solid var(--accent-cyan);
    }

    .weight-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-cyan);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .weight-card:active {
      cursor: grabbing;
      transform: scale(0.97);
    }

    /* ----- Адаптив ----- */
    @media (max-width: 820px) {
      .machine {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px;
      }
      .bottom-panel,
      .control-panel {
        grid-column: 1;
      }
      .wheel-3d {
        width: 160px;
        height: 160px;
        border-width: 8px;
      }
      .digits {
        font-size: 32px;
        min-width: 60px;
      }
      .side {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .scale-bar {
        height: 60px;
        width: 12px;
      }
    }

    /* Декоративная линия */
    .sivik-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      opacity: 0.1;
      margin: 2px 0;
    }
  </style>
</head>
<body>

  <!-- Стартовый экран -->
  <div id="overlay">
    <div class="start-card">
      <h1>SIVIK</h1>
      <div class="sub">Galaxy Plus</div>
      <div style="width:40px;height:2px;background:var(--accent-cyan);margin:12px auto;opacity:0.3;"></div>
      <p style="color:var(--muted); font-size:13px; margin-bottom:28px; letter-spacing:1px;">
        Балансировочный станок<br>Нажмите для загрузки системы
      </p>
      <button class="start-btn" id="bootBtn">▶ ЗАПУСК</button>
    </div>
  </div>

  <!-- Основное приложение -->
  <div class="app">
    <div class="machine">

      <!-- Левая панель -->
      <div class="side">
        <div class="display">
          <span class="label">◄ ВНУТРЕННЯЯ</span>
          <div id="left-val" class="digits">0</div>
        </div>
        <div class="scale-bar">
          <div id="left-scale" class="scale-fill"></div>
        </div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">г</div>
      </div>

      <!-- Центр -->
      <div class="center-zone">
        <div class="title">⚙ DIAGNOSTIC</div>
        <div class="wheel-wrapper">
          <div id="wheel" class="wheel-3d">
            <span class="brand">SIVIK</span>
            <div class="drop-targets">
              <div class="drop-zone" id="zone-left" data-side="left"></div>
              <div class="drop-zone" id="zone-right" data-side="right"></div>
            </div>
          </div>
        </div>

        <!-- Кнопки управления в стиле Sivik (Новое, Очистка, Оптимизация, Установка, Split) -->
        <div class="control-panel">
          <button class="ctrl-btn primary" id="btnNew">Новое</button>
          <button class="ctrl-btn danger" id="btnClear">Очистка</button>
          <button class="ctrl-btn" id="btnOptimize">Оптимизация</button>
          <button class="ctrl-btn" id="btnSetup">Установка</button>
          <button class="ctrl-btn" id="btnSplit">Split</button>
          <div class="fuel-indicator">
            <span class="dot"></span> Бенз
          </div>
        </div>

        <div class="sivik-divider"></div>
      </div>

      <!-- Правая панель -->
      <div class="side">
        <div class="display">
          <span class="label">ВНЕШНЯЯ ►</span>
          <div id="right-val" class="digits">0</div>
        </div>
        <div class="scale-bar">
          <div id="right-scale" class="scale-fill"></div>
        </div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">г</div>
      </div>

      <!-- Грузики -->
      <div class="bottom-panel">
        <div class="weight-card" draggable="true" data-weight="5">5 г</div>
        <div class="weight-card" draggable="true" data-weight="10">10 г</div>
        <div class="weight-card" draggable="true" data-weight="15">15 г</div>
        <div class="weight-card" draggable="true" data-weight="30">30 г</div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ----- Конфигурация (веса для генерации дисбаланса) -----
      const imbalanceOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40];

      // ----- DOM -----
      const overlay = document.getElementById('overlay');
      const bootBtn = document.getElementById('bootBtn');
      const leftVal = document.getElementById('left-val');
      const rightVal = document.getElementById('right-val');
      const leftScale = document.getElementById('left-scale');
      const rightScale = document.getElementById('right-scale');
      const wheel = document.getElementById('wheel');
      const zoneLeft = document.getElementById('zone-left');
      const zoneRight = document.getElementById('zone-right');
      const weightCards = document.querySelectorAll('.weight-card');

      // Кнопки управления
      const btnNew = document.getElementById('btnNew');
      const btnClear = document.getElementById('btnClear');
      const btnOptimize = document.getElementById('btnOptimize');
      const btnSetup = document.getElementById('btnSetup');
      const btnSplit = document.getElementById('btnSplit');

      // ----- Состояние -----
      let targetLeft = 0;
      let targetRight = 0;
      let currentLeft = 0;
      let currentRight = 0;
      let isMeasuring = false;
      let draggedWeight = 0;

      // ----- Голосовой движок (максимально приближен к оригинальному Sivik) -----
      function speakSivik(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.pitch = 0.4; // очень низкий тон
        utterance.rate = 0.75; // медленный, индустриальный
        utterance.volume = 0.9;

        // Попытка выбрать мужской голос с низким тоном (если доступен)
        const voices = window.speechSynthesis.getVoices();
        // Ищем русский мужской голос
        const ruVoice = voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('male'));
        if (ruVoice) {
          utterance.voice = ruVoice;
        } else {
          // иначе просто берем первый доступный, но настраиваем pitch
          // можно также попробовать найти голос с 'Alexander' или 'Dmitry'
          const altVoice = voices.find(v => v.name.includes('Alexander') || v.name.includes('Dmitry'));
          if (altVoice) utterance.voice = altVoice;
        }

        window.speechSynthesis.speak(utterance);
      }

      // Предзагрузка голосов (некоторые браузеры загружают их асинхронно)
      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices(); // инициируем загрузку
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.getVoices();
        };
      }

      // ----- Обновление интерфейса -----
      function updateInterface() {
        const leftDiff = Math.max(0, targetLeft - currentLeft);
        const rightDiff = Math.max(0, targetRight - currentRight);

        // Левая
        if (leftDiff === 0) {
          leftVal.textContent = '0';
          leftVal.classList.add('ok');
          leftScale.style.height = '100%';
          leftScale.classList.add('ok');
        } else {
          leftVal.textContent = leftDiff;
          leftVal.classList.remove('ok');
          const pct = Math.min(100, ((targetLeft - currentLeft) / targetLeft) * 100);
          leftScale.style.height = pct + '%';
          leftScale.classList.remove('ok');
        }

        // Правая
        if (rightDiff === 0) {
          rightVal.textContent = '0';
          rightVal.classList.add('ok');
          rightScale.style.height = '100%';
          rightScale.classList.add('ok');
        } else {
          rightVal.textContent = rightDiff;
          rightVal.classList.remove('ok');
          const pct = Math.min(100, ((targetRight - currentRight) / targetRight) * 100);
          rightScale.style.height = pct + '%';
          rightScale.classList.remove('ok');
        }

        // Проверка баланса (автоматическое озвучивание происходит только в startMeasurement)
        // Здесь мы не озвучиваем, чтобы не перебивать.
      }

      // ----- Голосовой отчёт о дисбалансе -----
      function generateVoiceReport() {
        let report = '';
        if (targetLeft === 0) {
          report += 'С левой стороны в норме. ';
        } else {
          report += 'С левой стороны ' + targetLeft + ' грамм. ';
        }
        if (targetRight === 0) {
          report += 'С правой стороны в норме.';
        } else {
          report += 'С правой стороны ' + targetRight + ' грамм.';
        }
        speakSivik(report);
      }

      // ----- Запуск измерения (аналог кнопки "Новое") -----
      function startMeasurement(announce = true) {
        if (isMeasuring) return;
        isMeasuring = true;

        // Убираем грузики с колеса
        document.querySelectorAll('.placed-weight').forEach(el => el.remove());

        // Сбрасываем накопленные значения
        currentLeft = 0;
        currentRight = 0;

        // Вращение колеса
        wheel.classList.add('spinning');

        if (announce) speakSivik('Идёт измерение');

        // Симуляция измерения
        setTimeout(() => {
          wheel.classList.remove('spinning');

          // Генерируем случайный дисбаланс
          targetLeft = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];
          targetRight = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];

          updateInterface();
          if (announce) generateVoiceReport();
          isMeasuring = false;

          // Если дисбаланс равен нулю, говорим об этом
          if (targetLeft === 0 && targetRight === 0) {
            speakSivik('Колесо отбалансировано');
          }
        }, 2000);
      }

      // ----- Очистка грузов -----
      function clearWeights() {
        if (isMeasuring) {
          speakSivik('Подождите, идёт измерение');
          return;
        }
        document.querySelectorAll('.placed-weight').forEach(el => el.remove());
        currentLeft = 0;
        currentRight = 0;
        updateInterface();
        speakSivik('Грузы удалены');
      }

      // ----- Обработчики событий -----

      // 1. Запуск по кнопке "ЗАПУСК"
      bootBtn.addEventListener('click', function(e) {
        e.preventDefault();
        overlay.style.display = 'none';
        startMeasurement(true);
      });

      // 2. Кнопка "Новое" (аналог "Следующее")
      btnNew.addEventListener('click', function(e) {
        e.preventDefault();
        if (!isMeasuring) {
          startMeasurement(true);
        }
      });

      // 3. Кнопка "Очистка"
      btnClear.addEventListener('click', function(e) {
        e.preventDefault();
        clearWeights();
      });

      // 4. Кнопка "Оптимизация" (заглушка – просто голосовое сообщение)
      btnOptimize.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Оптимизация не реализована');
      });

      // 5. Кнопка "Установка" (заглушка)
      btnSetup.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Установка параметров');
      });

      // 6. Кнопка "Split" (заглушка)
      btnSplit.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Режим Split');
      });

      // 7. Drag & Drop для грузиков
      weightCards.forEach(card => {
        card.addEventListener('dragstart', function(e) {
          draggedWeight = parseInt(this.getAttribute('data-weight'), 10);
          e.dataTransfer.setData('text/plain', String(draggedWeight));
        });
      });

      // Настройка зон для сброса
      function setupDropZone(zone, side) {
        zone.addEventListener('dragover', function(e) {
          e.preventDefault();
          this.classList.add('hovered');
        });

        zone.addEventListener('dragleave', function(e) {
          this.classList.remove('hovered');
        });

        zone.addEventListener('drop', function(e) {
          e.preventDefault();
          this.classList.remove('hovered');

          if (isMeasuring) {
            speakSivik('Подождите, идёт измерение');
            return;
          }

          const weight = parseInt(e.dataTransfer.getData('text/plain'), 10);
          if (isNaN(weight) || weight <= 0) return;

          // Проверка перевеса
          if (side === 'left') {
            if (currentLeft + weight > targetLeft && targetLeft > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentLeft += weight;
          } else {
            if (currentRight + weight > targetRight && targetRight > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentRight += weight;
          }

          // Отображаем грузик на колесе
          const wEl = document.createElement('div');
          wEl.className = 'placed-weight';
          wEl.textContent = weight + 'г';
          zone.appendChild(wEl);

          updateInterface();

          // Если после добавления груза баланс достигнут
          const leftDiff = Math.max(0, targetLeft - currentLeft);
          const rightDiff = Math.max(0, targetRight - currentRight);
          if (leftDiff === 0 && rightDiff === 0 && !isMeasuring) {
            speakSivik('Колесо отбалансировано');
          }
        });
      }

      setupDropZone(zoneLeft, 'left');
      setupDropZone(zoneRight, 'right');

      // Предотвращаем стандартное поведение браузера для drag-drop
      document.addEventListener('dragover', function(e) { e.preventDefault(); });
      document.addEventListener('drop', function(e) { e.preventDefault(); });

      // Убираем подсветку зон после завершения перетаскивания
      document.addEventListener('dragend', function() {
        document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hovered'));
      });

      console.log('Sivik Galaxy Plus загружен');
    })();
  </script>
</body>
</html>
