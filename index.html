<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sivik Galaxy Plus — Симулятор балансировочного станка</title>
  <style>
    /* ----- Общие сбросы и переменные ----- */
    :root {
      --bg-dark: #0a0e17;
      --panel-bg: #10161f;
      --accent-cyan: #00d4c0;
      --accent-blue: #1a6b8a;
      --neon-red: #ff3b30;
      --neon-green: #3dff7a;
      --muted: #7a8a9e;
      --text-light: #c8d6e5;
      --glass: rgba(255, 255, 255, 0.03);
      --border-glow: rgba(0, 212, 192, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: 'Courier New', 'Consolas', monospace;
      background: radial-gradient(ellipse at 50% 20%, #111f2e, #070b12);
      color: var(--text-light);
      overflow: hidden;
      user-select: none;
    }

    /* ----- Стартовый экран (Sivik Galaxy Plus) ----- */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 11, 18, 0.96);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-card {
      background: linear-gradient(145deg, #0f1a26, #091018);
      border: 1px solid var(--accent-cyan);
      padding: 44px 54px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 212, 192, 0.08), inset 0 0 40px rgba(0, 212, 192, 0.02);
      max-width: 480px;
    }

    .start-card h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent-cyan);
      text-shadow: 0 0 30px rgba(0, 212, 192, 0.2);
      margin-bottom: 6px;
    }

    .start-card .sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 6px;
      text-transform: uppercase;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 10px;
      margin-bottom: 24px;
    }

    .start-btn {
      background: transparent;
      color: var(--accent-cyan);
      border: 1.5px solid var(--accent-cyan);
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 2px;
      background: rgba(0, 212, 192, 0.04);
    }

    .start-btn:hover {
      background: var(--accent-cyan);
      color: #0a0e17;
      box-shadow: 0 0 40px rgba(0, 212, 192, 0.25);
      transform: scale(1.03);
    }

    /* ----- Основной интерфейс станка ----- */
    .app {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .machine {
      width: 100%;
      max-width: 1160px;
      background: linear-gradient(165deg, rgba(18, 28, 40, 0.92), rgba(8, 14, 22, 0.96));
      border-radius: 20px;
      padding: 24px 26px 20px;
      border: 1px solid rgba(0, 212, 192, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      display: grid;
      grid-template-columns: 210px 1fr 210px;
      gap: 16px;
      align-items: start;
    }

    /* ----- Боковые панели ----- */
    .side {
      background: rgba(12, 20, 30, 0.6);
      border-radius: 12px;
      padding: 14px 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .display {
      width: 100%;
      background: #070d14;
      border-radius: 8px;
      padding: 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .display .label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .digits {
      font-family: 'Courier New', monospace;
      font-size: 40px;
      line-height: 1.2;
      color: var(--neon-red);
      text-shadow: 0 0 12px rgba(255, 59, 48, 0.2);
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 80px;
      text-align: center;
      letter-spacing: 2px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .digits.ok {
      color: var(--neon-green);
      text-shadow: 0 0 20px rgba(61, 255, 122, 0.2);
    }

    /* Шкала (Sivik style) */
    .scale-bar {
      width: 16px;
      height: 110px;
      background: #03080f;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    .scale-fill {
      width: 100%;
      height: 0%;
      background: var(--neon-red);
      position: absolute;
      bottom: 0;
      transition: height 0.25s ease, background 0.3s;
      border-radius: 0 0 10px 10px;
    }

    .scale-fill.ok {
      background: var(--neon-green);
      box-shadow: 0 0 20px rgba(61, 255, 122, 0.15);
    }

    /* ----- Центр: колесо и управление ----- */
    .center-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .center-zone .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-cyan);
      letter-spacing: 4px;
      text-transform: uppercase;
      background: rgba(0, 212, 192, 0.04);
      padding: 4px 18px;
      border-radius: 20px;
      border: 1px solid rgba(0, 212, 192, 0.06);
    }

    .wheel-wrapper {
      perspective: 900px;
      margin: 6px 0 4px;
    }

    .wheel-3d {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #3a4a5e, #0f1a26 70%, #050a10);
      border: 10px solid #2a3a4a;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 212, 192, 0.03);
      transform: rotateX(18deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .wheel-3d::before {
      content: '';
      position: absolute;
      width: 94%;
      height: 94%;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.04);
    }

    .wheel-3d .brand {
      color: rgba(255, 255, 255, 0.08);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 6px;
      z-index: 1;
      text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .spinning {
      animation: spin 1.6s cubic-bezier(0.3, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotateX(18deg) rotate(0deg);
      }
      100% {
        transform: rotateX(18deg) rotate(360deg);
      }
    }

    /* Зоны сброса грузов */
    .drop-targets {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      padding: 0 6px;
    }

    .drop-zone {
      width: 70px;
      height: 100%;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      transition: all 0.25s;
      gap: 3px;
      padding: 4px;
    }

    .drop-zone.hovered {
      background: rgba(0, 212, 192, 0.08);
      border-color: var(--accent-cyan);
      box-shadow: inset 0 0 30px rgba(0, 212, 192, 0.02);
    }

    .placed-weight {
      background: rgba(0, 212, 192, 0.12);
      color: var(--accent-cyan);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(0, 212, 192, 0.15);
      font-weight: 600;
      width: 100%;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Кнопка следующего измерения */
    .action-btn {
      background: transparent;
      color: var(--accent-cyan);
      border: 1px solid var(--accent-cyan);
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.25s;
      margin-top: 4px;
      display: none;
      background: rgba(0, 212, 192, 0.04);
    }

    .action-btn:hover {
      background: var(--accent-cyan);
      color: #0a0e17;
      box-shadow: 0 0 30px rgba(0, 212, 192, 0.15);
    }

    .action-btn.visible {
      display: inline-block;
    }

    /* ----- Нижняя панель с грузами (Sivik стиль) ----- */
    .bottom-panel {
      grid-column: 1 / span 3;
      background: rgba(12, 20, 30, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding: 14px 18px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .weight-card {
      background: linear-gradient(145deg, #1e2f3e, #0f1a26);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-light);
      padding: 10px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: all 0.2s;
      letter-spacing: 1px;
      border-left: 2px solid var(--accent-cyan);
    }

    .weight-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-cyan);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .weight-card:active {
      cursor: grabbing;
      transform: scale(0.97);
    }

    /* ----- Адаптив ----- */
    @media (max-width: 820px) {
      .machine {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 16px;
      }
      .bottom-panel {
        grid-column: 1;
      }
      .wheel-3d {
        width: 170px;
        height: 170px;
        border-width: 8px;
      }
      .digits {
        font-size: 30px;
        min-width: 60px;
      }
      .side {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .scale-bar {
        height: 60px;
        width: 14px;
      }
    }

    /* Небольшая декоративная линия в стиле Sivik */
    .sivik-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      opacity: 0.15;
      margin: 2px 0;
    }
  </style>
</head>
<body>

  <!-- Стартовый экран -->
  <div id="overlay">
    <div class="start-card">
      <h1>SIVIK</h1>
      <div class="sub">Galaxy Plus</div>
      <div style="width:40px;height:2px;background:var(--accent-cyan);margin:12px auto;opacity:0.3;"></div>
      <p style="color:var(--muted); font-size:13px; margin-bottom:28px; letter-spacing:1px;">
        Балансировочный станок<br>Нажмите для загрузки системы
      </p>
      <button class="start-btn" id="bootBtn">▶ ЗАПУСК</button>
    </div>
  </div>

  <!-- Основное приложение -->
  <div class="app">
    <div class="machine">

      <!-- Левая панель -->
      <div class="side">
        <div class="display">
          <span class="label">◄ ВНУТРЕННЯЯ</span>
          <div id="left-val" class="digits">0</div>
        </div>
        <div class="scale-bar">
          <div id="left-scale" class="scale-fill"></div>
        </div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">г</div>
      </div>

      <!-- Центр -->
      <div class="center-zone">
        <div class="title">⚙ DIAGNOSTIC</div>
        <div class="wheel-wrapper">
          <div id="wheel" class="wheel-3d">
            <span class="brand">SIVIK</span>
            <div class="drop-targets">
              <div class="drop-zone" id="zone-left" data-side="left"></div>
              <div class="drop-zone" id="zone-right" data-side="right"></div>
            </div>
          </div>
        </div>
        <button id="btn-next" class="action-btn">СЛЕДУЮЩЕЕ</button>
        <div class="sivik-divider"></div>
      </div>

      <!-- Правая панель -->
      <div class="side">
        <div class="display">
          <span class="label">ВНЕШНЯЯ ►</span>
          <div id="right-val" class="digits">0</div>
        </div>
        <div class="scale-bar">
          <div id="right-scale" class="scale-fill"></div>
        </div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;">г</div>
      </div>

      <!-- Грузики -->
      <div class="bottom-panel">
        <div class="weight-card" draggable="true" data-weight="5">5 г</div>
        <div class="weight-card" draggable="true" data-weight="10">10 г</div>
        <div class="weight-card" draggable="true" data-weight="15">15 г</div>
        <div class="weight-card" draggable="true" data-weight="30">30 г</div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ----- Конфигурация (веса для генерации дисбаланса) -----
      const imbalanceOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40];

      // ----- DOM -----
      const overlay = document.getElementById('overlay');
      const bootBtn = document.getElementById('bootBtn');
      const leftVal = document.getElementById('left-val');
      const rightVal = document.getElementById('right-val');
      const leftScale = document.getElementById('left-scale');
      const rightScale = document.getElementById('right-scale');
      const wheel = document.getElementById('wheel');
      const btnNext = document.getElementById('btn-next');
      const zoneLeft = document.getElementById('zone-left');
      const zoneRight = document.getElementById('zone-right');
      const weightCards = document.querySelectorAll('.weight-card');

      // ----- Состояние -----
      let targetLeft = 0;
      let targetRight = 0;
      let currentLeft = 0;
      let currentRight = 0;
      let isMeasuring = false;
      let draggedWeight = 0;

      // ----- Голосовой движок (Sivik style) -----
      function speakSivik(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.pitch = 0.5;
        utterance.rate = 0.8;
        utterance.volume = 0.9;
        window.speechSynthesis.speak(utterance);
      }

      // ----- Обновление интерфейса -----
      function updateInterface() {
        const leftDiff = Math.max(0, targetLeft - currentLeft);
        const rightDiff = Math.max(0, targetRight - currentRight);

        // Левая
        if (leftDiff === 0) {
          leftVal.textContent = '0';
          leftVal.classList.add('ok');
          leftScale.style.height = '100%';
          leftScale.classList.add('ok');
        } else {
          leftVal.textContent = leftDiff;
          leftVal.classList.remove('ok');
          const pct = Math.min(100, ((targetLeft - currentLeft) / targetLeft) * 100);
          leftScale.style.height = pct + '%';
          leftScale.classList.remove('ok');
        }

        // Правая
        if (rightDiff === 0) {
          rightVal.textContent = '0';
          rightVal.classList.add('ok');
          rightScale.style.height = '100%';
          rightScale.classList.add('ok');
        } else {
          rightVal.textContent = rightDiff;
          rightVal.classList.remove('ok');
          const pct = Math.min(100, ((targetRight - currentRight) / targetRight) * 100);
          rightScale.style.height = pct + '%';
          rightScale.classList.remove('ok');
        }

        // Проверка баланса
        const balanced = (leftDiff === 0 && rightDiff === 0);
        if (balanced && !isMeasuring) {
          speakSivik('Колесо отбалансировано');
          btnNext.classList.add('visible');
        } else {
          btnNext.classList.remove('visible');
        }
      }

      // ----- Голосовой отчёт о дисбалансе -----
      function generateVoiceReport() {
        let report = '';
        if (targetLeft === 0) {
          report += 'С левой стороны в норме. ';
        } else {
          report += 'С левой стороны ' + targetLeft + ' грамм. ';
        }
        if (targetRight === 0) {
          report += 'С правой стороны в норме.';
        } else {
          report += 'С правой стороны ' + targetRight + ' грамм.';
        }
        speakSivik(report);
      }

      // ----- Запуск измерения -----
      function startMeasurement() {
        if (isMeasuring) return;
        isMeasuring = true;

        // Убираем грузики с колеса
        document.querySelectorAll('.placed-weight').forEach(el => el.remove());

        // Сбрасываем накопленные значения
        currentLeft = 0;
        currentRight = 0;

        // Вращение колеса
        wheel.classList.add('spinning');

        speakSivik('Идёт измерение');

        // Симуляция измерения
        setTimeout(() => {
          wheel.classList.remove('spinning');

          // Генерируем случайный дисбаланс
          targetLeft = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];
          targetRight = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];

          updateInterface();
          generateVoiceReport();
          isMeasuring = false;
        }, 2000);
      }

      // ----- Обработчики событий -----

      // 1. Запуск по кнопке "ЗАПУСК"
      bootBtn.addEventListener('click', function(e) {
        e.preventDefault();
        overlay.style.display = 'none';
        startMeasurement();
      });

      // 2. Кнопка "СЛЕДУЮЩЕЕ"
      btnNext.addEventListener('click', function(e) {
        e.preventDefault();
        if (!isMeasuring) {
          startMeasurement();
        }
      });

      // 3. Drag & Drop для грузиков
      weightCards.forEach(card => {
        card.addEventListener('dragstart', function(e) {
          draggedWeight = parseInt(this.getAttribute('data-weight'), 10);
          e.dataTransfer.setData('text/plain', String(draggedWeight));
        });
      });

      // Настройка зон для сброса
      function setupDropZone(zone, side) {
        zone.addEventListener('dragover', function(e) {
          e.preventDefault();
          this.classList.add('hovered');
        });

        zone.addEventListener('dragleave', function(e) {
          this.classList.remove('hovered');
        });

        zone.addEventListener('drop', function(e) {
          e.preventDefault();
          this.classList.remove('hovered');

          if (isMeasuring) {
            speakSivik('Подождите, идёт измерение');
            return;
          }

          const weight = parseInt(e.dataTransfer.getData('text/plain'), 10);
          if (isNaN(weight) || weight <= 0) return;

          // Проверка перевеса
          if (side === 'left') {
            if (currentLeft + weight > targetLeft && targetLeft > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentLeft += weight;
          } else {
            if (currentRight + weight > targetRight && targetRight > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentRight += weight;
          }

          // Отображаем грузик на колесе
          const wEl = document.createElement('div');
          wEl.className = 'placed-weight';
          wEl.textContent = weight + 'г';
          zone.appendChild(wEl);

          updateInterface();
        });
      }

      setupDropZone(zoneLeft, 'left');
      setupDropZone(zoneRight, 'right');

      // Предотвращаем стандартное поведение браузера для drag-drop
      document.addEventListener('dragover', function(e) { e.preventDefault(); });
      document.addEventListener('drop', function(e) { e.preventDefault(); });

      // Убираем подсветку зон после завершения перетаскивания
      document.addEventListener('dragend', function() {
        document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hovered'));
      });

      // Скрываем кнопку при старте
      btnNext.classList.remove('visible');

      console.log('Sivik Galaxy Plus загружен');
    })();
  </script>
</body>
</html>
