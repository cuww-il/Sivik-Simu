<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sivik Galaxy Plus — Симулятор балансировочного станка</title>
  <style>
    /* ===== СБРОС ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: 'Courier New', 'Consolas', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* ===== СТАРТОВЫЙ ЭКРАН ===== */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 10, 30, 0.95);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-card {
      background: linear-gradient(145deg, #0c1a2e, #06101e);
      border: 2px solid #00b8a0;
      padding: 44px 54px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 80px rgba(0, 184, 160, 0.08);
      max-width: 480px;
    }

    .start-card h1 {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #00d4c0;
      text-shadow: 0 0 40px rgba(0, 212, 192, 0.15);
    }

    .start-card .sub {
      font-size: 14px;
      color: #5a7a8a;
      letter-spacing: 10px;
      text-transform: uppercase;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 10px;
      margin: 6px 0 24px;
    }

    .start-btn {
      background: transparent;
      color: #00d4c0;
      border: 2px solid #00d4c0;
      padding: 14px 44px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 4px;
      background: rgba(0, 212, 192, 0.03);
    }

    .start-btn:hover {
      background: #00d4c0;
      color: #06101e;
      box-shadow: 0 0 50px rgba(0, 212, 192, 0.2);
      transform: scale(1.03);
    }

    /* ===== ОСНОВНОЙ ЭКРАН ===== */
    body {
      background: radial-gradient(ellipse at 50% 30%, #1a6bd4 0%, #0a3a8a 45%, #041a4a 80%, #020d22 100%);
    }

    /* Волны на заднем плане */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(100, 200, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(100, 200, 255, 0.04) 0%, transparent 50%),
        repeating-linear-gradient(90deg,
          transparent 0px,
          transparent 120px,
          rgba(255, 255, 255, 0.008) 120px,
          rgba(255, 255, 255, 0.008) 122px),
        repeating-linear-gradient(0deg,
          transparent 0px,
          transparent 80px,
          rgba(255, 255, 255, 0.005) 80px,
          rgba(255, 255, 255, 0.005) 82px);
    }

    /* Полукруглые линии-волны (абстрактный узор) */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 10% 90%, rgba(120, 200, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 10%, rgba(120, 200, 255, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(80, 180, 255, 0.03) 0%, transparent 70%);
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ===== КОРПУС СТАНКА (тёмная рамка) ===== */
    .machine-body {
      width: 100%;
      max-width: 1200px;
      background: linear-gradient(165deg, #1a2634, #0f1822);
      border-radius: 28px;
      padding: 14px 16px 12px;
      border: 2px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.85), inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    /* ===== ЭКРАН (синий фон с узором) ===== */
    .screen {
      background:
        radial-gradient(ellipse at 30% 20%, #2a7ad4, #0e4a9a 50%, #062a6a 80%, #031a3a);
      border-radius: 18px;
      padding: 12px 16px 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.3), 0 0 40px rgba(0, 160, 255, 0.03);
      position: relative;
      overflow: hidden;
      min-height: 580px;
    }

    /* Узор на экране — светлые полукруглые линии */
    .screen::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 120%;
      height: 140%;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(160, 220, 255, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(160, 220, 255, 0.03) 0%, transparent 40%),
        repeating-radial-gradient(circle at 50% 100%, transparent 0px, transparent 80px, rgba(255, 255, 255, 0.012) 80px, rgba(255, 255, 255, 0.012) 82px),
        repeating-radial-gradient(circle at 50% 0%, transparent 0px, transparent 120px, rgba(255, 255, 255, 0.008) 120px, rgba(255, 255, 255, 0.008) 122px);
      z-index: 0;
    }

    /* Полукруглые волны (дополнительный слой) */
    .screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(200, 240, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(200, 240, 255, 0.02) 0%, transparent 40%);
    }

    /* Все содержимое экрана поверх фона */
    .screen>* {
      position: relative;
      z-index: 1;
    }

    /* ===== СТАТУС-БАР (светло-серая полоса) ===== */
    .status-bar {
      background: linear-gradient(180deg, #c8d4e0, #b0bec8);
      border-radius: 6px 6px 0 0;
      padding: 4px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 30px;
      border-bottom: 2px solid rgba(0, 0, 0, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-icon {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #2a3a4a;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-icon .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3a7a3a;
      box-shadow: 0 0 8px rgba(60, 180, 60, 0.3);
    }

    .status-icon .dot.orange {
      background: #d4880a;
      box-shadow: 0 0 8px rgba(212, 136, 10, 0.3);
    }

    .status-icon .dot.blue {
      background: #2a7ad4;
      box-shadow: 0 0 8px rgba(42, 122, 212, 0.3);
    }

    .status-right {
      font-size: 12px;
      color: #2a3a4a;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ===== ЗАГОЛОВОК (жёлтая надпись) ===== */
    .header-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #ffcc00;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3), 0 0 30px rgba(255, 204, 0, 0.05);
      letter-spacing: 2px;
      padding: 4px 0 6px;
      font-family: 'Arial', 'Helvetica', sans-serif;
    }

    /* ===== ОСНОВНОЙ КОНТЕНТ (три колонки) ===== */
    .main-content {
      display: grid;
      grid-template-columns: 180px 1fr 180px;
      gap: 12px;
      align-items: start;
      padding: 4px 0;
    }

    /* ===== ЛЕВОЕ ТАБЛО (жёлтое) ===== */
    .display-left {
      background: linear-gradient(180deg, #fde835, #f5c400);
      border-radius: 12px;
      padding: 8px 6px 6px;
      border: 2px solid #d4a800;
      box-shadow: inset 0 -4px 12px rgba(0, 0, 0, 0.15), inset 0 4px 12px rgba(255, 255, 200, 0.3), 0 4px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .display-left .label {
      font-size: 9px;
      font-weight: 700;
      color: #5a4a00;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .display-left .digits {
      font-family: 'Courier New', monospace;
      font-size: 46px;
      line-height: 1.1;
      color: #2a2a2a;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.06);
      padding: 0 6px;
      border-radius: 4px;
      min-width: 70px;
      text-align: center;
      letter-spacing: 2px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      font-weight: 700;
    }

    .display-left .digits.ok {
      color: #1a6a1a;
    }

    /* Шкала слева */
    .scale-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-top: 4px;
    }

    .scale-bar {
      width: 10px;
      height: 70px;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      position: relative;
      overflow: visible;
      border: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .scale-fill {
      width: 100%;
      height: 0%;
      background: #e88800;
      position: absolute;
      bottom: 0;
      transition: height 0.25s ease;
      border-radius: 0 0 6px 6px;
      box-shadow: 0 0 12px rgba(232, 136, 0, 0.2);
    }

    .scale-fill.ok {
      background: #2a9a2a;
      box-shadow: 0 0 12px rgba(42, 154, 42, 0.2);
    }

    /* Оранжевый маркер-стрелка */
    .scale-marker {
      position: absolute;
      right: -18px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 12px solid #e88800;
      filter: drop-shadow(0 0 6px rgba(232, 136, 0, 0.3));
      transition: top 0.25s ease;
    }

    .scale-marker.ok {
      border-right-color: #2a9a2a;
      filter: drop-shadow(0 0 6px rgba(42, 154, 42, 0.3));
    }

    .scale-values {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 70px;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      padding: 0 2px;
    }

    /* ===== ПРАВОЕ ТАБЛО (синее) ===== */
    .display-right {
      background: linear-gradient(180deg, #4a9aee, #1a6ad4);
      border-radius: 12px;
      padding: 8px 6px 6px;
      border: 3px solid #ffffff;
      box-shadow: inset 0 -4px 12px rgba(0, 0, 0, 0.15), inset 0 4px 12px rgba(200, 230, 255, 0.2), 0 4px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .display-right .label {
      font-size: 9px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .display-right .digits {
      font-family: 'Courier New', monospace;
      font-size: 46px;
      line-height: 1.1;
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.08);
      padding: 0 6px;
      border-radius: 4px;
      min-width: 70px;
      text-align: center;
      letter-spacing: 2px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-weight: 700;
    }

    .display-right .digits.ok {
      color: #aaffaa;
    }

    /* Шкала справа */
    .scale-wrapper-right {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-top: 4px;
      flex-direction: row-reverse;
    }

    .scale-bar-right {
      width: 10px;
      height: 70px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      position: relative;
      overflow: visible;
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .scale-fill-right {
      width: 100%;
      height: 0%;
      background: #ffffff;
      position: absolute;
      bottom: 0;
      transition: height 0.25s ease;
      border-radius: 0 0 6px 6px;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
    }

    .scale-fill-right.ok {
      background: #aaffaa;
      box-shadow: 0 0 12px rgba(170, 255, 170, 0.15);
    }

    .scale-marker-right {
      position: absolute;
      left: -18px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid #ffffff;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.2));
      transition: top 0.25s ease;
    }

    .scale-marker-right.ok {
      border-left-color: #aaffaa;
      filter: drop-shadow(0 0 6px rgba(170, 255, 170, 0.2));
    }

    .scale-values-right {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 70px;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      padding: 0 2px;
    }

    /* ===== ЦЕНТР: КОЛЕСО ===== */
    .center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .wheel-wrapper {
      perspective: 1000px;
      margin: 0 auto;
      position: relative;
    }

    .wheel-3d {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 40% 35%, #6a7a8a, #2a3a4a 60%, #0a121a);
      border: 8px solid #3a4a5a;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.4);
      transform: rotateX(16deg) rotateY(-6deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
      margin: 0 auto;
    }

    /* Спицы */
    .wheel-3d::before {
      content: '';
      position: absolute;
      width: 88%;
      height: 88%;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.04);
      background:
        repeating-conic-gradient(rgba(255, 255, 255, 0.02) 0% 4%, transparent 4% 8%);
      background-size: 100% 100%;
    }

    /* Центральная ступица */
    .wheel-3d::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #5a6a7a, #1a2a3a);
      border: 3px solid #4a5a6a;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
      z-index: 2;
    }

    .wheel-3d .brand {
      color: rgba(255, 255, 255, 0.04);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 6px;
      z-index: 1;
      text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Мигающий оранжевый прямоугольник для установки груза */
    .weight-target {
      position: absolute;
      width: 36px;
      height: 18px;
      background: #ff8800;
      border: 2px solid #ffcc44;
      border-radius: 3px;
      z-index: 3;
      box-shadow: 0 0 20px rgba(255, 136, 0, 0.3), inset 0 0 10px rgba(255, 200, 0, 0.1);
      animation: blink-target 1.2s ease-in-out infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    @keyframes blink-target {
      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 25px rgba(255, 136, 0, 0.4);
      }
      50% {
        opacity: 0.3;
        box-shadow: 0 0 5px rgba(255, 136, 0, 0.1);
      }
    }

    .weight-target.hidden {
      animation: none;
      opacity: 0;
      box-shadow: none;
    }

    /* Зоны сброса грузов поверх колеса */
    .drop-targets {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      padding: 0 4px;
      z-index: 4;
    }

    .drop-zone {
      width: 44px;
      height: 100%;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      transition: all 0.25s;
      gap: 2px;
      padding: 2px;
    }

    .drop-zone.hovered {
      background: rgba(255, 200, 50, 0.12);
      border-color: #ffcc44;
      box-shadow: inset 0 0 30px rgba(255, 200, 50, 0.03);
    }

    .placed-weight {
      background: rgba(255, 200, 50, 0.15);
      color: #ffcc44;
      font-size: 8px;
      padding: 1px 4px;
      border-radius: 2px;
      border: 1px solid rgba(255, 200, 50, 0.12);
      font-weight: 700;
      width: 100%;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .spinning {
      animation: spin 1.6s cubic-bezier(0.3, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotateX(16deg) rotateY(-6deg) rotate(0deg);
      }
      100% {
        transform: rotateX(16deg) rotateY(-6deg) rotate(360deg);
      }
    }

    /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
    .bottom-panel {
      margin-top: 10px;
      background: linear-gradient(180deg, #2a3440, #1a222c);
      border-radius: 10px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.3), 0 2px 0 rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Схематичный вал с уровнем */
    .shaft-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 10px 2px 4px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .shaft-icon {
      width: 32px;
      height: 20px;
      background: linear-gradient(180deg, #4a5a6a, #2a3a4a);
      border-radius: 4px;
      border: 1px solid #4a5a6a;
      position: relative;
      overflow: hidden;
    }

    .shaft-level {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(180deg, #44dd44, #22aa22);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 0 20px rgba(68, 221, 68, 0.15);
      transition: height 0.3s;
    }

    .shaft-label {
      font-size: 10px;
      color: #6a8a9a;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Кнопки */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: linear-gradient(180deg, #3a4a58, #2a3a48);
      color: #b0c0cc;
      border: 1px solid #4a5a68;
      padding: 6px 18px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #0a121a, inset 0 1px 0 rgba(255, 255, 255, 0.05);
      font-family: inherit;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
    }

    .ctrl-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #0a121a, inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border-color: #5a7a8a;
      color: #d0dce8;
    }

    .ctrl-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0a121a;
    }

    .ctrl-btn.primary {
      background: linear-gradient(180deg, #4a5a68, #3a4a58);
      border-color: #5a7a8a;
      color: #d0dce8;
    }

    .ctrl-btn.primary:hover {
      border-color: #7a9aaa;
      color: #ffffff;
    }

    .ctrl-btn.danger {
      background: linear-gradient(180deg, #5a3a3a, #4a2a2a);
      border-color: #7a4a4a;
      color: #e8a0a0;
    }

    .ctrl-btn.danger:hover {
      border-color: #aa5a5a;
      color: #ffc0c0;
    }

    .ctrl-btn.warning {
      background: linear-gradient(180deg, #c8a030, #b08820);
      border-color: #d4b040;
      color: #1a1a0a;
      text-shadow: 0 1px 0 rgba(255, 255, 200, 0.2);
      box-shadow: 0 3px 0 #6a5010, inset 0 1px 0 rgba(255, 255, 200, 0.1);
    }

    .ctrl-btn.warning:hover {
      background: linear-gradient(180deg, #d8b040, #c09828);
      border-color: #e8c050;
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #6a5010, inset 0 1px 0 rgba(255, 255, 200, 0.15);
    }

    .ctrl-btn.warning:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #6a5010;
    }

    .ctrl-btn .arrow {
      display: inline-block;
      margin: 0 2px;
      font-size: 14px;
      line-height: 1;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 820px) {
      .main-content {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .display-left,
      .display-right {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding: 6px 10px;
      }
      .display-left .digits,
      .display-right .digits {
        font-size: 32px;
        min-width: 50px;
      }
      .scale-wrapper,
      .scale-wrapper-right {
        width: auto;
        margin-top: 0;
      }
      .scale-bar,
      .scale-bar-right {
        height: 40px;
        width: 8px;
      }
      .scale-values,
      .scale-values-right {
        height: 40px;
        font-size: 6px;
      }
      .scale-marker,
      .scale-marker-right {
        display: none;
      }
      .wheel-3d {
        width: 140px;
        height: 140px;
        border-width: 6px;
      }
      .bottom-panel {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .btn-group {
        justify-content: center;
      }
      .ctrl-btn {
        padding: 5px 12px;
        font-size: 10px;
      }
      .header-title {
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .machine-body {
        padding: 6px;
        border-radius: 16px;
      }
      .screen {
        padding: 6px 8px;
        border-radius: 12px;
        min-height: auto;
      }
      .status-bar {
        height: 24px;
        padding: 2px 8px;
        font-size: 9px;
      }
      .status-right {
        font-size: 9px;
      }
      .status-icon {
        font-size: 9px;
      }
      .display-left .digits,
      .display-right .digits {
        font-size: 26px;
        min-width: 40px;
      }
      .wheel-3d {
        width: 110px;
        height: 110px;
        border-width: 5px;
      }
      .weight-target {
        width: 28px;
        height: 14px;
      }
      .ctrl-btn {
        padding: 4px 10px;
        font-size: 9px;
        letter-spacing: 0.5px;
      }
      .header-title {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- СТАРТОВЫЙ ЭКРАН -->
  <div id="overlay">
    <div class="start-card">
      <h1>SIVIK</h1>
      <div class="sub">Galaxy Plus</div>
      <div style="width:40px;height:2px;background:#00d4c0;margin:12px auto;opacity:0.2;"></div>
      <p style="color:#5a7a8a; font-size:13px; margin-bottom:28px; letter-spacing:1px;">
        Балансировочный станок<br>Нажмите для загрузки системы
      </p>
      <button class="start-btn" id="bootBtn">▶ ЗАПУСК</button>
    </div>
  </div>

  <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
  <div class="app">
    <div class="machine-body">

      <div class="screen">

        <!-- СТАТУС-БАР -->
        <div class="status-bar">
          <div class="status-left">
            <span class="status-icon">
              <span class="dot"></span> STAT
            </span>
            <span class="status-icon">
              <span class="dot orange"></span> MOTO
            </span>
            <span class="status-icon">
              <span class="dot blue"></span> AUTO
            </span>
          </div>
          <div class="status-right" id="statusTime">ВТ 11:34:20 26-МАР-2019</div>
        </div>

        <!-- ЗАГОЛОВОК -->
        <div class="header-title">Установка груза / Левая сторона</div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="main-content">

          <!-- ЛЕВОЕ ТАБЛО (жёлтое) -->
          <div class="display-left">
            <span class="label">◄ ВНУТРЕННЯЯ</span>
            <div id="left-val" class="digits">0</div>
            <div class="scale-wrapper">
              <div class="scale-bar">
                <div id="left-scale" class="scale-fill"></div>
                <div id="left-marker" class="scale-marker" style="top:50%;"></div>
              </div>
              <div class="scale-values">
                <span>50</span>
                <span>25</span>
                <span>0</span>
              </div>
            </div>
          </div>

          <!-- ЦЕНТР: КОЛЕСО -->
          <div class="center-area">
            <div class="wheel-wrapper">
              <div id="wheel" class="wheel-3d">
                <span class="brand">SIVIK</span>
                <div id="weightTarget" class="weight-target"></div>
                <div class="drop-targets">
                  <div class="drop-zone" id="zone-left" data-side="left"></div>
                  <div class="drop-zone" id="zone-right" data-side="right"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- ПРАВОЕ ТАБЛО (синее) -->
          <div class="display-right">
            <span class="label">ВНЕШНЯЯ ►</span>
            <div id="right-val" class="digits">0</div>
            <div class="scale-wrapper-right">
              <div class="scale-bar-right">
                <div id="right-scale" class="scale-fill-right"></div>
                <div id="right-marker" class="scale-marker-right" style="top:50%;"></div>
              </div>
              <div class="scale-values-right">
                <span>50</span>
                <span>25</span>
                <span>0</span>
              </div>
            </div>
          </div>

        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div class="bottom-panel">

          <!-- Вал с уровнем -->
          <div class="shaft-indicator">
            <div class="shaft-icon">
              <div id="shaftLevel" class="shaft-level" style="height:60%;"></div>
            </div>
            <span class="shaft-label">Бенз</span>
          </div>

          <!-- Кнопки -->
          <div class="btn-group">
            <button class="ctrl-btn primary" id="btnNew">Новое</button>
            <button class="ctrl-btn danger" id="btnClear">
              <span class="arrow">↺</span> Очистка
            </button>
            <button class="ctrl-btn" id="btnOptimize">Оптимизация</button>
            <button class="ctrl-btn warning" id="btnSetup">
              <span class="arrow">⤻</span> Установка
            </button>
            <button class="ctrl-btn" id="btnSplit">Split</button>
          </div>

        </div>

      </div><!-- /screen -->

    </div><!-- /machine-body -->
  </div><!-- /app -->

  <script>
    (function() {
      'use strict';

      // ===== КОНФИГУРАЦИЯ =====
      const imbalanceOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40];

      // ===== DOM =====
      const overlay = document.getElementById('overlay');
      const bootBtn = document.getElementById('bootBtn');
      const leftVal = document.getElementById('left-val');
      const rightVal = document.getElementById('right-val');
      const leftScale = document.getElementById('left-scale');
      const rightScale = document.getElementById('right-scale');
      const leftMarker = document.getElementById('left-marker');
      const rightMarker = document.getElementById('right-marker');
      const wheel = document.getElementById('wheel');
      const weightTarget = document.getElementById('weightTarget');
      const zoneLeft = document.getElementById('zone-left');
      const zoneRight = document.getElementById('zone-right');
      const shaftLevel = document.getElementById('shaftLevel');
      const statusTime = document.getElementById('statusTime');

      const btnNew = document.getElementById('btnNew');
      const btnClear = document.getElementById('btnClear');
      const btnOptimize = document.getElementById('btnOptimize');
      const btnSetup = document.getElementById('btnSetup');
      const btnSplit = document.getElementById('btnSplit');

      const weightCards = document.querySelectorAll('.weight-card');

      // ===== СОСТОЯНИЕ =====
      let targetLeft = 0;
      let targetRight = 0;
      let currentLeft = 0;
      let currentRight = 0;
      let isMeasuring = false;
      let draggedWeight = 0;

      // ===== ВРЕМЯ В СТАТУС-БАРЕ =====
      function updateTime() {
        const now = new Date();
        const days = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
        const months = ['ЯНВ', 'ФЕВ', 'МАР', 'АПР', 'МАЙ', 'ИЮН', 'ИЮЛ', 'АВГ', 'СЕН', 'ОКТ', 'НОЯ', 'ДЕК'];
        const d = days[now.getDay()];
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const month = months[now.getMonth()];
        const year = now.getFullYear();
        statusTime.textContent = d + ' ' + h + ':' + m + ':' + s + ' ' + day + '-' + month + '-' + year;
      }
      updateTime();
      setInterval(updateTime, 1000);

      // ===== ГОЛОС =====
      function speakSivik(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.pitch = 0.4;
        utterance.rate = 0.75;
        utterance.volume = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const ruVoice = voices.find(v => v.lang.startsWith('ru') && v.name.toLowerCase().includes('male'));
        if (ruVoice) utterance.voice = ruVoice;
        else {
          const alt = voices.find(v => v.name.includes('Alexander') || v.name.includes('Dmitry'));
          if (alt) utterance.voice = alt;
        }
        window.speechSynthesis.speak(utterance);
      }

      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
      }

      // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
      function updateInterface() {
        const leftDiff = Math.max(0, targetLeft - currentLeft);
        const rightDiff = Math.max(0, targetRight - currentRight);

        // Левая
        if (leftDiff === 0) {
          leftVal.textContent = '0';
          leftVal.classList.add('ok');
          leftScale.style.height = '100%';
          leftScale.classList.add('ok');
          leftMarker.style.top = '0%';
          leftMarker.classList.add('ok');
        } else {
          leftVal.textContent = leftDiff;
          leftVal.classList.remove('ok');
          const pct = Math.min(100, ((targetLeft - currentLeft) / targetLeft) * 100);
          leftScale.style.height = pct + '%';
          leftScale.classList.remove('ok');
          leftMarker.style.top = (100 - pct) + '%';
          leftMarker.classList.remove('ok');
        }

        // Правая
        if (rightDiff === 0) {
          rightVal.textContent = '0';
          rightVal.classList.add('ok');
          rightScale.style.height = '100%';
          rightScale.classList.add('ok');
          rightMarker.style.top = '0%';
          rightMarker.classList.add('ok');
        } else {
          rightVal.textContent = rightDiff;
          rightVal.classList.remove('ok');
          const pct = Math.min(100, ((targetRight - currentRight) / targetRight) * 100);
          rightScale.style.height = pct + '%';
          rightScale.classList.remove('ok');
          rightMarker.style.top = (100 - pct) + '%';
          rightMarker.classList.remove('ok');
        }

        // Уровень "Бенз" (имитация)
        const avg = (targetLeft + targetRight) / 80;
        const level = Math.min(85, Math.max(15, 60 - avg * 30));
        shaftLevel.style.height = level + '%';

        // Мигающий прямоугольник
        const balanced = (leftDiff === 0 && rightDiff === 0);
        if (balanced && !isMeasuring) {
          weightTarget.classList.add('hidden');
        } else {
          weightTarget.classList.remove('hidden');
        }
      }

      // ===== ГОЛОСОВОЙ ОТЧЁТ =====
      function generateVoiceReport() {
        let report = '';
        if (targetLeft === 0) report += 'С левой стороны в норме. ';
        else report += 'С левой стороны ' + targetLeft + ' грамм. ';
        if (targetRight === 0) report += 'С правой стороны в норме.';
        else report += 'С правой стороны ' + targetRight + ' грамм.';
        speakSivik(report);
      }

      // ===== ЗАПУСК ИЗМЕРЕНИЯ =====
      function startMeasurement(announce = true) {
        if (isMeasuring) return;
        isMeasuring = true;

        document.querySelectorAll('.placed-weight').forEach(el => el.remove());
        currentLeft = 0;
        currentRight = 0;

        wheel.classList.add('spinning');
        weightTarget.classList.remove('hidden');
        if (announce) speakSivik('Идёт измерение');

        setTimeout(() => {
          wheel.classList.remove('spinning');

          targetLeft = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];
          targetRight = imbalanceOptions[Math.floor(Math.random() * imbalanceOptions.length)];

          updateInterface();
          if (announce) generateVoiceReport();
          isMeasuring = false;

          if (targetLeft === 0 && targetRight === 0) {
            speakSivik('Колесо отбалансировано');
            weightTarget.classList.add('hidden');
          }
        }, 2000);
      }

      // ===== ОЧИСТКА =====
      function clearWeights() {
        if (isMeasuring) {
          speakSivik('Подождите, идёт измерение');
          return;
        }
        document.querySelectorAll('.placed-weight').forEach(el => el.remove());
        currentLeft = 0;
        currentRight = 0;
        updateInterface();
        speakSivik('Грузы удалены');
        weightTarget.classList.remove('hidden');
      }

      // ===== СОБЫТИЯ =====

      bootBtn.addEventListener('click', function(e) {
        e.preventDefault();
        overlay.style.display = 'none';
        startMeasurement(true);
      });

      btnNew.addEventListener('click', function(e) {
        e.preventDefault();
        if (!isMeasuring) startMeasurement(true);
      });

      btnClear.addEventListener('click', function(e) {
        e.preventDefault();
        clearWeights();
      });

      btnOptimize.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Оптимизация не реализована');
      });

      btnSetup.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Установка параметров');
      });

      btnSplit.addEventListener('click', function(e) {
        e.preventDefault();
        speakSivik('Режим Split');
      });

      // ===== DRAG & DROP =====

      // Создаём грузики динамически, чтобы они были в DOM
      const bottomPanel = document.querySelector('.bottom-panel .btn-group');
      // Добавляем грузики после кнопок, в конец bottom-panel
      const weightsContainer = document.createElement('div');
      weightsContainer.style.display = 'flex';
      weightsContainer.style.gap = '8px';
      weightsContainer.style.flexWrap = 'wrap';
      weightsContainer.style.justifyContent = 'center';
      weightsContainer.style.width = '100%';
      weightsContainer.style.marginTop = '4px';

      const weightsData = [5, 10, 15, 30];
      weightsData.forEach(w => {
        const card = document.createElement('div');
        card.className = 'weight-card';
        card.draggable = true;
        card.dataset.weight = w;
        card.textContent = w + ' г';
        card.style.cssText = `
          background: linear-gradient(145deg, #3a4a5a, #1a2a3a);
          border: 1px solid rgba(255,255,255,0.04);
          color: #b0c0cc;
          padding: 4px 16px;
          border-radius: 20px;
          font-weight: 700;
          font-size: 12px;
          cursor: grab;
          user-select: none;
          box-shadow: 0 2px 8px rgba(0,0,0,0.3);
          transition: all 0.15s;
          letter-spacing: 0.5px;
          font-family: inherit;
          border-left: 2px solid #ffcc44;
        `;
        card.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-1px)';
          this.style.borderColor = '#ffcc44';
        });
        card.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
          this.style.borderColor = 'rgba(255,255,255,0.04)';
        });
        weightsContainer.appendChild(card);
      });

      // Вставляем в bottom-panel после btn-group
      const btnGroup = document.querySelector('.btn-group');
      if (btnGroup) {
        btnGroup.parentNode.insertBefore(weightsContainer, btnGroup.nextSibling);
      }

      // Обновляем ссылки на грузики
      const allWeightCards = document.querySelectorAll('.weight-card');

      allWeightCards.forEach(card => {
        card.addEventListener('dragstart', function(e) {
          draggedWeight = parseInt(this.dataset.weight, 10);
          e.dataTransfer.setData('text/plain', String(draggedWeight));
        });
      });

      // Зоны сброса
      function setupDropZone(zone, side) {
        zone.addEventListener('dragover', function(e) {
          e.preventDefault();
          this.classList.add('hovered');
        });

        zone.addEventListener('dragleave', function(e) {
          this.classList.remove('hovered');
        });

        zone.addEventListener('drop', function(e) {
          e.preventDefault();
          this.classList.remove('hovered');

          if (isMeasuring) {
            speakSivik('Подождите, идёт измерение');
            return;
          }

          const weight = parseInt(e.dataTransfer.getData('text/plain'), 10);
          if (isNaN(weight) || weight <= 0) return;

          if (side === 'left') {
            if (currentLeft + weight > targetLeft && targetLeft > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentLeft += weight;
          } else {
            if (currentRight + weight > targetRight && targetRight > 0) {
              speakSivik('Слишком много');
              return;
            }
            currentRight += weight;
          }

          const wEl = document.createElement('div');
          wEl.className = 'placed-weight';
          wEl.textContent = weight + 'г';
          zone.appendChild(wEl);

          updateInterface();

          const leftDiff = Math.max(0, targetLeft - currentLeft);
          const rightDiff = Math.max(0, targetRight - currentRight);
          if (leftDiff === 0 && rightDiff === 0 && !isMeasuring) {
            speakSivik('Колесо отбалансировано');
            weightTarget.classList.add('hidden');
          }
        });
      }

      setupDropZone(zoneLeft, 'left');
      setupDropZone(zoneRight, 'right');

      document.addEventListener('dragover', function(e) { e.preventDefault(); });
      document.addEventListener('drop', function(e) { e.preventDefault(); });

      document.addEventListener('dragend', function() {
        document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hovered'));
      });

      // Инициализация
      updateInterface();
      console.log('Sivik Galaxy Plus загружен');

    })();
  </script>

</body>
</html>
